name: diaspora_equb_frontend
version: 0.9.0
publish_to: none
description: Diaspora Equb DeFi mobile app

environment:
  sdk: '>=3.6.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  provider: ^6.1.1

  # Navigation
  go_router: ^13.0.0

  # HTTP client
  dio: ^5.4.0

  # Secure storage
  flutter_secure_storage: ^9.0.0

  # Web3 & Wallet
  web3dart: ^3.0.2
  http: ^1.2.0
  reown_sign: ^1.3.9
  url_launcher: ^6.3.2

  # Error tracking
  sentry_flutter: ^8.3.0

  # UI
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  shimmer: ^3.0.0
  intl: ^0.19.0
  percent_indicator: ^4.2.3
  reown_core: ^1.3.8
  qr_flutter: ^4.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
