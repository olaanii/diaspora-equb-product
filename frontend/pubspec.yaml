name: diaspora_equb_frontend
version: 0.9.0
publish_to: none
description: Diaspora Equb DeFi mobile app

environment:
  sdk: '>=3.6.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  provider: ^6.1.1

  # Navigation
  go_router: ^13.0.0

  # HTTP client
  dio: ^5.4.0
  firebase_auth: ^5.7.0
  firebase_core: ^3.15.2
  google_sign_in: ^6.3.0

  # Secure storage
  flutter_secure_storage: ^9.0.0
  image_picker: ^1.2.0

  # Web3 & Wallet
  http: ^1.2.0
  reown_sign: ^1.3.9
  url_launcher: ^6.3.2

  # Error tracking
  sentry_flutter: ^8.3.0

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  shimmer: ^3.0.0
  fl_chart: ^0.69.0
  intl: ^0.19.0
  percent_indicator: ^4.2.3
  reown_core: ^1.3.8
  qr_flutter: ^4.1.0
  local_auth: ^2.3.0
  socket_io_client: ^3.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.4
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/logo.png
  web:
    generate: true
    image_path: assets/logo.png
    background_color: "#F1FAEE"
    theme_color: "#1B4332"
