org.gradle.jvmargs=-Xmx4G -XX:MaxMetaspaceSize=512m -XX:ReservedCodeCacheSize=256m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true

# Use one worker to avoid daemon timeout on loaded/low-memory machines (e.g. "Unable to connect to Gradle Worker Daemon")
org.gradle.workers.max=1

# Keep daemon so second build is fast; if you see "Address already in use", set org.gradle.daemon=false
org.gradle.daemon=true
