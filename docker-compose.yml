# Docker Compose file — compatible with Docker CE and Docker Desktop Personal (free).
# No Swarm, no Docker Scout, no paid-only features.
# Usage: docker compose up -d

services:
  postgres:
    image: postgres:16-alpine
    container_name: equb-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DATABASE_USERNAME:-equb}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-Olani49415@}
      POSTGRES_DB: ${DATABASE_NAME:-diaspora_equb}
    ports:
      - '${DOCKER_DB_PORT:-5433}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DATABASE_USERNAME:-equb}']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: equb-backend
    restart: unless-stopped
    environment:
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_USERNAME: ${DATABASE_USERNAME:-equb}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-change_me}
      DATABASE_NAME: ${DATABASE_NAME:-diaspora_equb}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-1d}
      RPC_URL: ${RPC_URL:-https://rpc.cc3-testnet.creditcoin.network}
      CHAIN_ID: ${CHAIN_ID:-102031}
      IDENTITY_REGISTRY_ADDRESS: ${IDENTITY_REGISTRY_ADDRESS:-0x56050273Bca0e86fC8B3e289C9E1b9BD5978eece}
      TIER_REGISTRY_ADDRESS: ${TIER_REGISTRY_ADDRESS:-0xF6A8dBcC6C1eA72776AcF20ca66422DEcAC294cE}
      CREDIT_REGISTRY_ADDRESS: ${CREDIT_REGISTRY_ADDRESS:-0x64AE5370987Ed5318A00e7FB88a18f6A890190fB}
      COLLATERAL_VAULT_ADDRESS: ${COLLATERAL_VAULT_ADDRESS:-0x21F154eA8ade6C384F44947Ff705437821D0dDc1}
      PAYOUT_STREAM_ADDRESS: ${PAYOUT_STREAM_ADDRESS:-0x4fE169b73d212Ea8eACaB75edfA5d1ae0E914F97}
      EQUB_POOL_ADDRESS: ${EQUB_POOL_ADDRESS:-0xcADa53528e1b04E2370b2694b6c9a60e79d67203}
      EQUB_GOVERNOR_ADDRESS: ${EQUB_GOVERNOR_ADDRESS:-0x0000000000000000000000000000000000000000}
      SWAP_ROUTER_ADDRESS: ${SWAP_ROUTER_ADDRESS:-0x0000000000000000000000000000000000000000}
      ACHIEVEMENT_BADGE_ADDRESS: ${ACHIEVEMENT_BADGE_ADDRESS:-0x0000000000000000000000000000000000000000}
      TEST_USDC_ADDRESS: ${TEST_USDC_ADDRESS:-0xE7737c6152917b14eC82C81De4cA1C8851B995d1}
      TEST_USDT_ADDRESS: ${TEST_USDT_ADDRESS:-0xF8F273671D2CeBF9d2B5cF130c5aCFF1943826d7}
      FAYDA_API_URL: ${FAYDA_API_URL:-}
      FAYDA_API_KEY: ${FAYDA_API_KEY:-}
      CORS_ORIGINS: ${CORS_ORIGINS:-}
      SENTRY_DSN: ${SENTRY_DSN:-https://2ebf1be22b4ad799b85b76b5c0c482fb@o4510991350562816.ingest.de.sentry.io/4510991371665488}
      REDIS_URL: redis://redis:6379
      PORT: 3001
      NODE_ENV: ${NODE_ENV:-production}
    ports:
      - '${DOCKER_BACKEND_PORT:-3002}:3001'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '-q', '--spider', 'http://localhost:3001/api/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  redis:
    image: redis:7-alpine
    container_name: equb-redis
    restart: unless-stopped
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:alpine
    container_name: equb-nginx
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # Uncomment for SSL:
      # - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
